# ─────────────────────────────────────────────
#  HR APP — Spring Boot Configuration
# ─────────────────────────────────────────────

# Active profile — local for dev; prod in Docker/Render (see Dockerfile).
# Override via SPRING_PROFILES_ACTIVE env var.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ─── Database ────────────────────────────────
# Local: set in application-local.properties (gitignored).
# Prod/Render: set DB_URL, DB_USERNAME, DB_PASSWORD (or SPRING_DATASOURCE_*).
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────
app.jwt.secret=${JWT_SECRET:hrapp-super-secret-key-change-this-in-production-min-256-bits}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# ─── Swagger / OpenAPI ───────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packagesToScan=com.hrapp.controller
springdoc.paths-to-match=/**
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# ─── Logging ─────────────────────────────────
logging.level.com.hrapp=INFO
logging.level.org.springframework.security=WARN


# ─── HikariCP Connection Pool ────────────────
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=HrAppHikariPool
spring.datasource.hikari.auto-commit=true

# ─── JPA Performance ─────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

